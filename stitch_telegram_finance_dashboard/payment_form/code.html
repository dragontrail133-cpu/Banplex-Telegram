<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Payment Form</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-error": "#ffffff",
                    "secondary-fixed": "#cbe9da",
                    "on-primary-fixed-variant": "#00513b",
                    "on-surface": "#191c1d",
                    "on-error-container": "#93000a",
                    "surface-variant": "#e1e3e4",
                    "on-primary": "#ffffff",
                    "primary": "#004532",
                    "on-surface-variant": "#3f4944",
                    "on-secondary-fixed": "#052016",
                    "on-secondary-fixed-variant": "#324c41",
                    "on-tertiary-fixed": "#3b0908",
                    "primary-fixed-dim": "#8bd6b6",
                    "inverse-on-surface": "#f0f1f2",
                    "surface-container-highest": "#e1e3e4",
                    "tertiary": "#652925",
                    "background": "#f8f9fa",
                    "on-tertiary-fixed-variant": "#73332f",
                    "surface-container": "#edeeef",
                    "tertiary-fixed-dim": "#ffb3ac",
                    "secondary-fixed-dim": "#afcdbe",
                    "error-container": "#ffdad6",
                    "surface-container-low": "#f3f4f5",
                    "primary-container": "#065f46",
                    "on-tertiary": "#ffffff",
                    "on-primary-fixed": "#002116",
                    "surface": "#f8f9fa",
                    "on-tertiary-container": "#ffb4ad",
                    "on-secondary-container": "#4d685c",
                    "outline": "#6f7973",
                    "surface-container-lowest": "#ffffff",
                    "error": "#ba1a1a",
                    "outline-variant": "#bec9c2",
                    "surface-bright": "#f8f9fa",
                    "secondary": "#496458",
                    "surface-container-high": "#e7e8e9",
                    "primary-fixed": "#a6f2d1",
                    "on-background": "#191c1d",
                    "tertiary-container": "#823f3a",
                    "secondary-container": "#c8e7d7",
                    "on-primary-container": "#8bd6b7",
                    "inverse-surface": "#2e3132",
                    "on-secondary": "#ffffff",
                    "surface-tint": "#1b6b51",
                    "inverse-primary": "#8bd6b6",
                    "surface-dim": "#d9dadb",
                    "tertiary-fixed": "#ffdad6"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": [
                            "Manrope"
                    ],
                    "body": [
                            "Manrope"
                    ],
                    "label": [
                            "Manrope"
                    ]
            }
          },
        },
      }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
            background-color: theme('colors.surface-container-low');
            color: theme('colors.on-surface');
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen pb-24 md:pb-0 pt-20">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl shadow-sm dark:shadow-none flex justify-between items-center px-6 py-4 tonal shift bg-slate-50 dark:bg-slate-900/50">
<div class="flex items-center gap-4">
<button aria-label="Close" class="text-slate-500 hover:bg-slate-100 transition-colors rounded-full p-2">
<span class="material-symbols-outlined">close</span>
</button>
<h1 class="font-manrope font-bold text-lg tracking-tight text-emerald-900 dark:text-emerald-100">Pembayaran Baru</h1>
</div>
</header>
<main class="max-w-3xl mx-auto px-4 md:px-6 py-8 space-y-8">
<!-- Context Card (Ledger Style) -->
<section class="bg-surface-container-lowest rounded-xl p-6 shadow-[0_4px_20px_rgba(25,28,29,0.04),0_12px_40px_rgba(25,28,29,0.08)] relative overflow-hidden">
<div class="absolute top-0 right-0 p-4 opacity-10">
<span class="material-symbols-outlined text-6xl text-primary">receipt_long</span>
</div>
<div class="mb-4">
<span class="text-[0.75rem] uppercase tracking-[0.05em] text-on-surface-variant font-medium">INVOICE #INV-2023-089</span>
<h2 class="text-xl font-bold mt-1">Renovasi Dapur Klien B</h2>
</div>
<div class="grid grid-cols-2 md:grid-cols-3 gap-6 pt-4 border-t border-outline-variant/15">
<div>
<span class="text-[0.75rem] uppercase tracking-[0.05em] text-on-surface-variant block mb-1">TOTAL TAGIHAN</span>
<span class="text-lg font-bold">Rp 45.000.000</span>
</div>
<div>
<span class="text-[0.75rem] uppercase tracking-[0.05em] text-on-surface-variant block mb-1">TERBAYAR</span>
<span class="text-lg font-bold text-secondary">Rp 15.000.000</span>
</div>
<div class="col-span-2 md:col-span-1">
<span class="text-[0.75rem] uppercase tracking-[0.05em] text-on-surface-variant block mb-1">SISA TAGIHAN</span>
<span class="text-xl font-bold text-error">Rp 30.000.000</span>
</div>
</div>
</section>
<!-- Payment Form -->
<section class="space-y-6">
<!-- Amount Input -->
<div class="space-y-2">
<label class="text-[0.75rem] uppercase tracking-[0.05em] text-on-surface-variant font-medium block" for="amount">Nominal Pembayaran</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant font-medium">Rp</span>
<input class="w-full bg-surface-container-low border-b-2 border-transparent focus:border-primary focus:ring-0 rounded-t-lg pl-12 pr-4 py-4 text-2xl font-bold text-on-surface transition-colors" id="amount" placeholder="0" type="text" value="30.000.000"/>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Date Picker -->
<div class="space-y-2">
<label class="text-[0.75rem] uppercase tracking-[0.05em] text-on-surface-variant font-medium block" for="date">Tanggal Pembayaran</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant material-symbols-outlined">calendar_today</span>
<input class="w-full bg-surface-container-low border-b-2 border-transparent focus:border-primary focus:ring-0 rounded-t-lg pl-12 pr-4 py-3 text-on-surface transition-colors" id="date" type="date" value="2023-10-25"/>
</div>
</div>
<!-- Method -->
<div class="space-y-2">
<label class="text-[0.75rem] uppercase tracking-[0.05em] text-on-surface-variant font-medium block" for="method">Metode Pembayaran</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant material-symbols-outlined">account_balance</span>
<select class="w-full bg-surface-container-low border-b-2 border-transparent focus:border-primary focus:ring-0 rounded-t-lg pl-12 pr-10 py-3 text-on-surface transition-colors appearance-none" id="method">
<option value="bca">Transfer BCA</option>
<option value="mandiri">Transfer Mandiri</option>
<option value="cash">Tunai</option>
</select>
<span class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant material-symbols-outlined pointer-events-none">expand_more</span>
</div>
</div>
</div>
<!-- Notes -->
<div class="space-y-2">
<label class="text-[0.75rem] uppercase tracking-[0.05em] text-on-surface-variant font-medium block" for="notes">Catatan (Opsional)</label>
<textarea class="w-full bg-surface-container-low border-b-2 border-transparent focus:border-primary focus:ring-0 rounded-t-lg px-4 py-3 text-on-surface transition-colors" id="notes" placeholder="Tambahkan catatan pembayaran..." rows="3"></textarea>
</div>
</section>
</main>
<!-- Sticky Bottom CTA -->
<div class="fixed bottom-0 left-0 w-full bg-surface-container-lowest/90 backdrop-blur-md p-4 border-t border-outline-variant/15 md:relative md:bg-transparent md:border-none md:p-0 md:max-w-3xl md:mx-auto md:px-6 md:pb-12 z-40">
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-white text-lg font-bold py-4 px-6 rounded-xl shadow-[0_4px_20px_rgba(25,28,29,0.04),0_12px_40px_rgba(25,28,29,0.08)] hover:opacity-90 transition-opacity">
            Simpan Pembayaran
        </button>
</div>
</body></html>
