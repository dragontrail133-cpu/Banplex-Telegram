<!DOCTYPE html>

<html lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Material Invoice Form - The Financial Atelier</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-error": "#ffffff",
                    "secondary-fixed": "#cbe9da",
                    "on-primary-fixed-variant": "#00513b",
                    "on-surface": "#191c1d",
                    "on-error-container": "#93000a",
                    "surface-variant": "#e1e3e4",
                    "on-primary": "#ffffff",
                    "primary": "#004532",
                    "on-surface-variant": "#3f4944",
                    "on-secondary-fixed": "#052016",
                    "on-secondary-fixed-variant": "#324c41",
                    "on-tertiary-fixed": "#3b0908",
                    "primary-fixed-dim": "#8bd6b6",
                    "inverse-on-surface": "#f0f1f2",
                    "surface-container-highest": "#e1e3e4",
                    "tertiary": "#652925",
                    "background": "#f8f9fa",
                    "on-tertiary-fixed-variant": "#73332f",
                    "surface-container": "#edeeef",
                    "tertiary-fixed-dim": "#ffb3ac",
                    "secondary-fixed-dim": "#afcdbe",
                    "error-container": "#ffdad6",
                    "surface-container-low": "#f3f4f5",
                    "primary-container": "#065f46",
                    "on-tertiary": "#ffffff",
                    "on-primary-fixed": "#002116",
                    "surface": "#f8f9fa",
                    "on-tertiary-container": "#ffb4ad",
                    "on-secondary-container": "#4d685c",
                    "outline": "#6f7973",
                    "surface-container-lowest": "#ffffff",
                    "error": "#ba1a1a",
                    "outline-variant": "#bec9c2",
                    "surface-bright": "#f8f9fa",
                    "secondary": "#496458",
                    "surface-container-high": "#e7e8e9",
                    "primary-fixed": "#a6f2d1",
                    "on-background": "#191c1d",
                    "tertiary-container": "#823f3a",
                    "secondary-container": "#c8e7d7",
                    "on-primary-container": "#8bd6b7",
                    "inverse-surface": "#2e3132",
                    "on-secondary": "#ffffff",
                    "surface-tint": "#1b6b51",
                    "inverse-primary": "#8bd6b6",
                    "surface-dim": "#d9dadb",
                    "tertiary-fixed": "#ffdad6"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Manrope"],
                    "label": ["Manrope"]
            }
          }
        }
      }
    </script>
<style>
        body { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
        /* Custom Scrollbar for a cleaner look */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #bec9c2; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6f7973; }
        
        /* Specific input styling based on Design System */
        .ds-input {
            background-color: theme('colors.surface-container-low');
            border: none;
            border-bottom: 2px solid transparent;
            transition: border-color 0.2s ease;
        }
        .ds-input:focus {
            outline: none;
            box-shadow: none;
            border-bottom: 2px solid theme('colors.primary');
            background-color: theme('colors.surface-container');
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface antialiased min-h-screen flex flex-col md:flex-row">
<!-- Mobile Top App Bar (Only visible on mobile for this specific task context, normally suppressed if it's a sub-page, but keeping for structural completeness if requested by user prompt implicitly, though task says 'Full-screen sheet'. We'll treat it as a top-level sheet with a back button) -->
<header class="fixed top-0 w-full z-50 bg-surface-container-lowest/90 backdrop-blur-xl md:hidden px-4 py-4 flex items-center justify-between shadow-[0_1px_2px_rgba(25,28,29,0.05)]">
<button class="text-on-surface p-2 rounded-full hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
<h1 class="font-headline font-bold text-lg tracking-tight text-on-surface">Input Faktur</h1>
<button class="text-on-surface p-2 rounded-full hover:bg-surface-container-low transition-colors invisible">
<span class="material-symbols-outlined">more_vert</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-3xl mx-auto pt-20 pb-28 md:pt-12 md:pb-12 px-4 md:px-8 flex flex-col gap-8">
<!-- Header Section -->
<section class="flex flex-col gap-2">
<div class="hidden md:flex items-center gap-4 mb-4">
<button class="text-on-surface p-2 rounded-full hover:bg-surface-container-low transition-colors bg-surface-container-lowest shadow-sm">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline font-bold text-[2rem] tracking-tight text-on-surface">Faktur / Surat Jalan</h1>
</div>
<p class="text-on-surface-variant font-body text-sm md:hidden">Record new material delivery</p>
</section>
<!-- Form Section 1: Header Info -->
<section class="bg-surface-container-lowest rounded-xl p-6 shadow-[0_4px_20px_rgba(25,28,29,0.02)] flex flex-col gap-6 relative overflow-hidden">
<!-- Decorative Accent -->
<div class="absolute top-0 left-0 w-1 h-full bg-primary-container"></div>
<h2 class="font-headline font-bold text-lg text-primary-container">Informasi Dokumen</h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Project Selection -->
<div class="flex flex-col gap-2">
<label class="font-label text-xs uppercase tracking-[0.05em] text-on-surface-variant font-bold">Proyek</label>
<div class="relative">
<select class="ds-input w-full p-3 rounded-t-lg rounded-b-none text-on-surface font-body text-sm appearance-none cursor-pointer">
<option disabled="" selected="" value="">Pilih Proyek...</option>
<option value="p1">Villa Kencana Bali</option>
<option value="p2">Resort Amandari</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline pointer-events-none">expand_more</span>
</div>
</div>
<!-- Supplier Selection -->
<div class="flex flex-col gap-2">
<label class="font-label text-xs uppercase tracking-[0.05em] text-on-surface-variant font-bold">Supplier</label>
<div class="relative">
<select class="ds-input w-full p-3 rounded-t-lg rounded-b-none text-on-surface font-body text-sm appearance-none cursor-pointer">
<option disabled="" selected="" value="">Pilih Supplier...</option>
<option value="s1">PT. Bangun Perkasa (Semen)</option>
<option value="s2">CV. Kayu Jati Mas</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline pointer-events-none">expand_more</span>
</div>
</div>
<!-- Date -->
<div class="flex flex-col gap-2">
<label class="font-label text-xs uppercase tracking-[0.05em] text-on-surface-variant font-bold">Tanggal</label>
<div class="relative">
<input class="ds-input w-full p-3 rounded-t-lg rounded-b-none text-on-surface font-body text-sm" type="date" value="2023-10-27"/>
</div>
</div>
<!-- Reference Number -->
<div class="flex flex-col gap-2">
<label class="font-label text-xs uppercase tracking-[0.05em] text-on-surface-variant font-bold">No. Referensi / Surat Jalan</label>
<input class="ds-input w-full p-3 rounded-t-lg rounded-b-none text-on-surface font-body text-sm" placeholder="Contoh: SJ-2023-10-001" type="text"/>
</div>
</div>
</section>
<!-- Form Section 2: Line Items -->
<section class="bg-surface-container-lowest rounded-xl p-0 shadow-[0_4px_20px_rgba(25,28,29,0.02)] flex flex-col overflow-hidden">
<div class="p-6 border-b border-surface-container-high/30 flex justify-between items-center bg-surface-container-low/50">
<h2 class="font-headline font-bold text-lg text-primary-container">Daftar Material</h2>
<button class="flex items-center gap-2 text-primary hover:text-primary-container transition-colors bg-surface-container-lowest px-3 py-1.5 rounded-lg shadow-sm">
<span class="material-symbols-outlined text-sm">add</span>
<span class="font-label text-xs font-bold uppercase tracking-wider">Tambah</span>
</button>
</div>
<div class="flex flex-col">
<!-- Item 1 -->
<div class="p-6 flex flex-col md:flex-row gap-4 items-start md:items-center relative group">
<div class="flex-1 w-full grid grid-cols-1 md:grid-cols-12 gap-4 items-end">
<div class="flex flex-col gap-2 md:col-span-5">
<label class="font-label text-[10px] uppercase tracking-[0.05em] text-outline">Material</label>
<input class="ds-input w-full p-2 rounded-t-lg rounded-b-none text-on-surface font-body text-sm" readonly="" type="text" value="Semen Portland 50kg"/>
</div>
<div class="flex flex-col gap-2 md:col-span-2">
<label class="font-label text-[10px] uppercase tracking-[0.05em] text-outline">Qty</label>
<input class="ds-input w-full p-2 rounded-t-lg rounded-b-none text-on-surface font-body text-sm text-right" type="number" value="100"/>
</div>
<div class="flex flex-col gap-2 md:col-span-2">
<label class="font-label text-[10px] uppercase tracking-[0.05em] text-outline">Satuan</label>
<select class="ds-input w-full p-2 rounded-t-lg rounded-b-none text-on-surface font-body text-sm appearance-none">
<option selected="" value="zak">Zak</option>
<option value="pcs">Pcs</option>
</select>
</div>
<div class="flex flex-col gap-2 md:col-span-3">
<label class="font-label text-[10px] uppercase tracking-[0.05em] text-outline">Harga Satuan (Rp)</label>
<input class="ds-input w-full p-2 rounded-t-lg rounded-b-none text-on-surface font-body text-sm text-right" type="text" value="55.000"/>
</div>
</div>
<button class="mt-6 md:mt-0 p-2 text-outline hover:text-error transition-colors rounded-full hover:bg-error-container/50 self-end md:self-auto">
<span class="material-symbols-outlined" data-icon="delete">delete</span>
</button>
</div>
</div>
</section>
<!-- Form Section 3: Summary -->
<section class="bg-surface-container-lowest rounded-xl p-6 shadow-[0_4px_20px_rgba(25,28,29,0.02)] flex flex-col gap-4">
<div class="flex justify-between items-center py-2">
<span class="font-body text-on-surface-variant text-sm">Subtotal</span>
<span class="font-body text-on-surface font-medium">Rp 5.500.000</span>
</div>
<div class="flex justify-between items-center py-2">
<span class="font-body text-on-surface-variant text-sm">Pajak (PPN 11%)</span>
<span class="font-body text-on-surface font-medium">Rp 605.000</span>
</div>
<div class="flex justify-between items-center pt-4 mt-2 border-t border-surface-container-high/30">
<span class="font-headline font-bold text-on-surface text-lg">Total</span>
<span class="font-headline font-bold text-primary-container text-2xl tracking-tight">Rp 6.105.000</span>
</div>
</section>
</main>
<!-- Sticky Bottom Action (Mobile) / Fixed Bottom Action (Desktop) -->
<div class="fixed bottom-0 left-0 w-full bg-surface-container-lowest/90 backdrop-blur-xl border-t border-surface-container-high/30 p-4 md:p-6 z-40 flex justify-end md:justify-center">
<div class="w-full max-w-3xl flex gap-4 justify-end">
<button class="hidden md:block px-6 py-3 rounded-xl font-label font-bold text-sm tracking-wide text-on-surface bg-surface-container-high hover:bg-surface-variant transition-colors">
                Batal
            </button>
<button class="w-full md:w-auto px-8 py-3 rounded-xl font-label font-bold text-sm tracking-wide text-white bg-gradient-to-br from-primary to-primary-container shadow-[0_4px_12px_rgba(0,69,50,0.2)] hover:shadow-[0_6px_16px_rgba(0,69,50,0.3)] hover:-translate-y-0.5 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-sm">save</span>
                Simpan Faktur
            </button>
</div>
</div>
</body></html>
